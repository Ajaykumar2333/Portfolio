<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOYD Field — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fdfdfc;
    --input-bg:#f4f4f3;
    --toggle-bg:#f0f0ee;
    --green-1:#0E6642;
    --green-2:#014F2F;
    --text:#171717;
    --muted:#9b9b96;
    --border:#ececea;
    --badge-red:#e6483a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Poppins', sans-serif;
    background:linear-gradient(160deg,#1c8f5e 0%, #0e6642 55%, #063d27 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
  }
  .phone{
    width:375px;
    min-height:812px;
    background:var(--bg);
    border-radius:36px;
    box-shadow:0 30px 80px rgba(0,0,0,0.35), 0 0 0 8px #1a1a1a;
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
  }
  .statusbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 24px 4px;
    font-size:13px;
    font-weight:600;
    color:var(--text);
  }
  .content{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:20px 26px 30px;
  }

  .brand-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:6px;
    margin-bottom:8px;
  }
  .brand-left{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-logo{ width:32px; height:32px; flex-shrink:0; }
  .brand-word{
    font-size:15px;
    font-weight:800;
    letter-spacing:0.5px;
    color:var(--text);
  }
  .brand-word span{ color:var(--green-2); }

  .back-btn{
    width:34px; height:34px;
    border-radius:50%;
    background:var(--input-bg);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    margin-bottom:18px;
  }

  .headline{
    font-size:26px;
    font-weight:700;
    color:var(--text);
    margin-top:8px;
    margin-bottom:22px;
  }

  /* segmented toggle */
  .mode-toggle{
    display:flex;
    background:var(--toggle-bg);
    border-radius:999px;
    padding:5px;
    margin-bottom:26px;
  }
  .mode-toggle button{
    flex:1;
    border:none;
    background:transparent;
    font-family:'Poppins', sans-serif;
    font-size:13.5px;
    font-weight:600;
    color:var(--muted);
    padding:12px 8px;
    border-radius:999px;
    cursor:pointer;
    transition:background .18s ease, color .18s ease, box-shadow .18s ease;
  }
  .mode-toggle button.active{
    background:linear-gradient(135deg, var(--green-1), var(--green-2));
    color:#fff;
    box-shadow:0 8px 18px rgba(14,102,66,0.35);
  }

  .panel{ display:none; }
  .panel.active{ display:flex; flex-direction:column; flex:1; }

  .field{ margin-bottom:18px; }
  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--text);
    margin-bottom:8px;
  }
  .input-wrap{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--input-bg);
    border:1.5px solid transparent;
    border-radius:14px;
    padding:15px 16px;
    transition:border-color .15s ease;
  }
  .input-wrap:focus-within{ border-color:var(--green-2); }
  .input-wrap input{
    border:none;
    outline:none;
    flex:1;
    font-family:'Poppins', sans-serif;
    font-size:14px;
    color:var(--text);
    background:transparent;
  }
  .input-wrap input::placeholder{ color:#b2b2ac; }
  .eye{ cursor:pointer; opacity:0.55; }

  .row-between{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:2px 0 22px;
  }
  .remember{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:var(--text);
  }
  .checkbox{
    width:17px; height:17px;
    border-radius:5px;
    border:1.5px solid #d6d6d2;
    background:#fff;
  }
  .forgot{
    font-size:13px;
    font-weight:600;
    color:var(--green-2);
    text-decoration:none;
  }

  .btn-primary{
    width:100%;
    background:linear-gradient(135deg, var(--green-1), var(--green-2));
    color:#fff;
    border:none;
    padding:16px;
    border-radius:999px;
    font-family:'Poppins', sans-serif;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 12px 24px rgba(14,102,66,0.35);
  }
  .btn-primary:disabled{
    opacity:0.5;
    cursor:not-allowed;
    box-shadow:none;
  }

  .footer-note{
    text-align:center;
    margin-top:auto;
    padding-top:24px;
    font-size:12.5px;
    color:var(--muted);
  }
  .footer-note a{ color:var(--green-2); font-weight:700; text-decoration:none; }

  /* OTP verify step */
  .otp-back{
    display:flex;
    align-items:center;
    margin-bottom:6px;
  }
  .otp-headline{
    font-size:22px;
    font-weight:700;
    color:var(--text);
    margin-top:26px;
    margin-bottom:8px;
  }
  .otp-subline{
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
    margin-bottom:28px;
  }
  .otp-subline b{ color:var(--text); font-weight:600; }
  .otp-boxes{
    display:flex;
    gap:14px;
    margin-bottom:20px;
  }
  .otp-boxes input{
    width:54px;
    height:54px;
    aspect-ratio:1/1;
    text-align:center;
    font-size:19px;
    font-weight:700;
    color:var(--text);
    background:#fff;
    border:1.5px solid var(--border);
    border-radius:12px;
    outline:none;
    font-family:'Poppins', sans-serif;
    transition:border-color .15s ease;
  }
  .otp-boxes input:focus{ border-color:var(--green-2); }
  .otp-resend{
    font-size:13px;
    color:var(--muted);
    margin-bottom:30px;
  }
  .otp-resend .resend-link{
    color:var(--green-2);
    font-weight:700;
    cursor:pointer;
  }
  .otp-resend .resend-link.disabled{ color:#c9c9c3; cursor:default; }
</style>
</head>
<body>

<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span>📶 🔋</span>
  </div>

  <div class="content">

    <div class="brand-row">
      <div class="brand-left">
        <svg class="brand-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M76 22C85.5 30 91 41.7 91 54.5C91 78.4 71.7 97.7 47.8 97.7C43.4 97.7 39.2 97 35.2 95.7"
                stroke="#0E6642" stroke-width="7.5" stroke-linecap="round" fill="none"/>
          <path d="M24 26C15.5 34.3 10.3 45.9 10.3 58.7C10.3 68.8 13.5 78.1 18.9 85.7"
                stroke="#0E6642" stroke-width="7.5" stroke-linecap="round" fill="none"/>
          <path d="M27 27L50 78L73 21" stroke="#0E6642" stroke-width="7.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
          <path d="M14 62L24 88" stroke="#0E6642" stroke-width="7.5" stroke-linecap="round" fill="none"/>
        </svg>
        <div class="brand-word">VOY<span>D</span> FIELD</div>
      </div>
    </div>

    <div class="headline">Welcome back</div>

    <div class="mode-toggle">
      <button type="button" class="active" id="tab-password" onclick="setMode('password')">Email Login</button>
      <button type="button" id="tab-otp" onclick="setMode('otp')">OTP Login</button>
    </div>

    <!-- PASSWORD PANEL -->
    <div class="panel active" id="panel-password">

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <input type="text" placeholder="myaccount@voyd.com" />
        </div>
      </div>

      <div class="field" style="margin-bottom:6px;">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="pw-input" placeholder="••••••••••••" />
          <svg class="eye" onclick="togglePw()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#171717" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
      </div>

      <div class="row-between">
        <div class="remember">
          <div class="checkbox"></div>
          Remember Me
        </div>
        <a href="#" class="forgot">Forgot Password?</a>
      </div>

      <button class="btn-primary">Login</button>

      <div class="footer-note">
        Trouble logging in? Contact your <a href="#">site supervisor</a>
      </div>
    </div>

    <!-- OTP PANEL -->
    <div class="panel" id="panel-otp">

      <div id="otp-request-step">
        <div class="field">
          <label>Employee ID or Mobile Number</label>
          <div class="input-wrap">
            <input type="text" id="otp-target" placeholder="EMP104 or 98765 43210" />
          </div>
        </div>
        <button class="btn-primary" onclick="sendOtp()">Send OTP</button>

        <div class="footer-note">
          Trouble logging in? Contact your <a href="#">site supervisor</a>
        </div>
      </div>

      <div id="otp-verify-step" style="display:none; flex:1; display:none; flex-direction:column;">
        <div class="otp-back" onclick="backToRequest()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#171717" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="otp-headline">Enter Verification Code</div>
        <div class="otp-subline">Enter the 4-digit code sent to<br/><b id="otp-sent-to">—</b></div>

        <div class="otp-boxes">
          <input maxlength="1" inputmode="numeric" />
          <input maxlength="1" inputmode="numeric" />
          <input maxlength="1" inputmode="numeric" />
          <input maxlength="1" inputmode="numeric" />
        </div>

        <div class="otp-resend">
          Didn't receive a code? <span class="resend-link" id="resend-link" onclick="sendOtp()">Resend</span>
        </div>

        <button class="btn-primary" style="margin-top:auto;">Verify</button>
      </div>
    </div>

  </div>
</div>

<script>
  function setMode(mode){
    const pwPanel = document.getElementById('panel-password');
    const otpPanel = document.getElementById('panel-otp');
    const tabPw = document.getElementById('tab-password');
    const tabOtp = document.getElementById('tab-otp');

    if(mode === 'password'){
      pwPanel.classList.add('active');
      otpPanel.classList.remove('active');
      tabPw.classList.add('active');
      tabOtp.classList.remove('active');
    } else {
      otpPanel.classList.add('active');
      pwPanel.classList.remove('active');
      tabOtp.classList.add('active');
      tabPw.classList.remove('active');
    }
  }

  function togglePw(){
    const input = document.getElementById('pw-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function sendOtp(){
    const target = document.getElementById('otp-target').value.trim();
    document.getElementById('otp-sent-to').textContent = target || 'your registered contact';

    document.getElementById('otp-request-step').style.display = 'none';
    const verifyStep = document.getElementById('otp-verify-step');
    verifyStep.style.display = 'flex';

    const boxes = verifyStep.querySelectorAll('.otp-boxes input');
    if(boxes[0]) boxes[0].focus();

    let seconds = 30;
    const resend = document.getElementById('resend-link');
    resend.classList.add('disabled');
    resend.textContent = `Resend in ${seconds}s`;
    const timer = setInterval(() => {
      seconds -= 1;
      if(seconds <= 0){
        clearInterval(timer);
        resend.classList.remove('disabled');
        resend.textContent = 'Resend';
      } else {
        resend.textContent = `Resend in ${seconds}s`;
      }
    }, 1000);
  }

  function backToRequest(){
    document.getElementById('otp-verify-step').style.display = 'none';
    document.getElementById('otp-request-step').style.display = 'block';
  }

  document.querySelectorAll('.otp-boxes input').forEach((box, idx, all) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/[^0-9]/g, '');
      if(box.value && idx < all.length - 1){
        all[idx + 1].focus();
      }
    });
    box.addEventListener('keydown', (e) => {
      if(e.key === 'Backspace' && !box.value && idx > 0){
        all[idx - 1].focus();
      }
    });
  });
</script>

</body>
</html>
